<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SurTech Reception Interface</title>
  <style>
    html, body {
      height: 100%;
    }
    body {
      margin: 0;
      background-color: #001f3f;
      font-family: 'Segoe UI', sans-serif;
      color: white;
      text-align: center;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background-color: #0033A0;
      padding: 10px;
      font-size: 1.5em;
      font-weight: bold;
    }
    .welcome-bar {
      background-color: #111;
      color: #FFD700;
      padding: 8px;
      font-weight: bold;
    }
    .main {
      padding: 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    h1 {
      color: #FFFFFF;
      margin-bottom: 20px;
    }
    .buttons {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .button {
      background-color: #0047AB;
      border-radius: 14px;
      padding: 28px 45px;
      color: white;
      font-weight: bold;
      font-size: 1.3em;
      cursor: pointer;
      transition: background-color 0.3s;
      text-decoration: none;
      display: inline-block;
    }
    .button:hover {
      background-color: #005FCC;
    }
    footer {
      background-color: #0033A0;
      padding: 10px;
      font-size: 1em;
    }
  </style>
</head>
<body>
  <header>
    <img src="SurTech Logo.png" style="height:80px; vertical-align:middle;">
    SURTECH
  </header>

  <div class="welcome-bar">
    Welcome to SURTECH – Powered by JIS Group
  </div>

  <div class="main">
    <h1>Welcome to SURTECH!</h1>
    <div class="buttons">

      <a href="comingsoon.html" class="button">Campus Map</a>
      <a href="events.html" class="button">Event Schedule</a>
      <a href="question.html" class="button">Ask a Question</a>
    </div>
  </div>

  <footer>
    SURTECH © 2026
  </footer>
</body>
</html>
